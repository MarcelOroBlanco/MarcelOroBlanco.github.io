<style>
  :root {
    --bg: #0a0b0d;
    --bg-elevated: #131418;
    --bg-hover: #191b20;
    --fg: #eceef2;
    --fg-dim: #a0a4ad;
    --fg-faint: #6b6f78;
    --border: #24262c;
    --border-hover: #3a3d45;
    --serif: 'Fraunces', 'Times New Roman', serif;
    --sans: 'Inter', -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-weight: 400;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(60, 80, 110, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(40, 50, 70, 0.06) 0%, transparent 50%),
      linear-gradient(180deg, #0a0b0d 0%, #0d0e11 50%, #08090b 100%);
    pointer-events: none;
    z-index: -2;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
    z-index: -1;
    mix-blend-mode: overlay;
  }

  .top-nav {
    max-width: 880px;
    margin: 0 auto;
    padding: 40px 32px 0;
  }

  .back-link {
    color: var(--fg-dim);
    text-decoration: none;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    font-weight: 500;
    transition: color 0.25s ease;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }

  .back-link:hover { color: var(--fg); }
  .back-link .arrow { transition: transform 0.25s ease; }
  .back-link:hover .arrow { transform: translateX(-3px); }

  main {
    max-width: 880px;
    margin: 0 auto;
    padding: 80px 32px 80px;
  }

  .release-card {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: start;
    animation: fadeUp 1.2s ease-out;
    margin-bottom: 120px;
  }

  .release-art-col {
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .release-art {
    position: relative;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .release-art:hover { transform: scale(1.02); }

  .release-art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(0.95) contrast(1.05);
  }

  .credits {
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .credits p {
    font-size: 0.78rem;
    line-height: 1.7;
    color: var(--fg-dim);
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  .credits p + p {
    margin-top: 4px;
    color: var(--fg-faint);
  }

  .release-info .release-type {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.35em;
    color: var(--fg-dim);
    margin-bottom: 16px;
    font-weight: 500;
  }

  .release-info h1 {
    font-family: var(--serif);
    font-weight: 700;
    font-size: clamp(2.5rem, 5.5vw, 3.75rem);
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 12px;
  }

  .release-info .artist {
    font-size: 0.95rem;
    color: var(--fg-dim);
    margin-bottom: 32px;
    font-weight: 400;
  }

  .streaming-links {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .stream-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg);
    text-decoration: none;
    font-family: var(--sans);
    font-size: 0.88rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  .stream-btn:hover {
    border-color: var(--border-hover);
    background: var(--bg-hover);
  }

  .stream-btn .platform {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .stream-btn .icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stream-btn .icon img {
    width: 100%;
    height: 100%;
    display: block;
  }

  .stream-btn .action {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--fg-faint);
    font-weight: 500;
    transition: color 0.2s ease;
  }

  .stream-btn:hover .action { color: var(--fg); }
  .stream-btn.soon .action { color: var(--fg-dim); }

  /* ===== LYRICS ===== */
  .lyrics {
    max-width: 560px;
    margin: 0 auto;
    scroll-margin-top: 40px;
  }

  .section-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.4em;
    color: var(--fg-dim);
    margin-bottom: 40px;
    text-align: center;
    font-weight: 500;
  }

  .lyrics-body {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 1.05rem;
    line-height: 1.9;
    color: var(--fg);
    text-align: center;
    letter-spacing: 0.005em;
  }

  .lyrics-body .stanza + .stanza {
    margin-top: 1.8em;
  }

  .lyrics-body .line {
    display: block;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 680px) {
    .top-nav { padding: 28px 24px 0; }
    main { padding: 50px 24px 60px; }
    .release-card {
      grid-template-columns: 1fr;
      gap: 36px;
      margin-bottom: 90px;
    }
    .release-art-col {
      max-width: 340px;
      margin: 0 auto;
      width: 100%;
    }
    .release-info { text-align: center; }
    .streaming-links { text-align: left; }
    .credits { text-align: center; }
    .lyrics-body { font-size: 1rem; }
  }
</style>
